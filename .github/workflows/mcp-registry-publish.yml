name: Publish to MCP Registry

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["After NPM Publish", "After Docker Publish"]
    types: [completed]
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    # workflow_run の場合、トリガー元が成功した場合のみ実行
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      id-token: write # Required for OIDC authentication
      actions: read # Required to check other workflow runs

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Get version
        id: version
        run: |
          VERSION=$(jq -r '.version' package.json)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Check both publish workflows succeeded
        if: ${{ github.event_name != 'workflow_dispatch' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # トリガー元でないもう一方のワークフローの成功を確認
          TRIGGER_WORKFLOW="${{ github.event.workflow_run.name }}"

          if [ "$TRIGGER_WORKFLOW" = "After NPM Publish" ]; then
            OTHER_WORKFLOW="After Docker Publish"
          else
            OTHER_WORKFLOW="After NPM Publish"
          fi

          echo "Triggered by: ${TRIGGER_WORKFLOW}"
          echo "Checking: ${OTHER_WORKFLOW}"

          # もう一方のワークフローの最新の実行結果を確認
          CONCLUSION=$(gh run list \
            --workflow "${OTHER_WORKFLOW}" \
            --branch main \
            --limit 1 \
            --json conclusion \
            --jq '.[0].conclusion')

          echo "Other workflow conclusion: ${CONCLUSION}"

          if [ "$CONCLUSION" != "success" ]; then
            echo "Skipping: ${OTHER_WORKFLOW} has not succeeded yet (status: ${CONCLUSION})"
            exit 1
          fi

      - name: Update server.json version
        run: |
          VERSION=${{ steps.version.outputs.version }}
          jq --arg v "$VERSION" '
            .version = $v |
            .packages[0].version = $v |
            .packages[1].identifier = "ghcr.io/esaio/esa-mcp-server:" + $v
          ' server.json > server.json.tmp && mv server.json.tmp server.json
          cat server.json

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: Publish server to MCP Registry
        run: ./mcp-publisher publish
